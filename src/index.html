<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whatsapp</title>
    <link rel="stylesheet" href="style.css">


</head>
<script></script>
<body>

    <div class="estrutura">
        <div class="topo">
            <img src="../icon/whatsapp.png" alt="Whatsapp">
            <h2>WhatsApp bb</h2>
        </div>

        <div class="mensagem">
            <p>
                Olá! Insira seus dados para ser direcionado ao Whatsapp:
            </p>
        </div>
        
        <form>
            <label>Seu Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome">

            <label>Seu e-mail:</label>
            <input type="email" id="email" placeholder="exemplo@gmail.com"> 

            <label>Seu Whatsapp:</label>
            <input type="text" id="whatsapp" placeholder="+55 (00) 00000-0000">

            <button onclick="enviar()">
                Ir para o WhatsApp
            </button>

        </form> 


    </div>

    <script src="script.js"></script>
    
</body>
</html>
